<html lang="en">
<head>

    <title>color-mixer</title>
    <script type="text/javascript" src="./index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="target-color-box"></div>
    <script>
        const colors = [
            {color:'#e42112',weight:2},
            {color:'#324315',weight:6},
            {color:'#753257',weight:4},
            {color:'#df4575',weight:5}
        ]
        const targetColorBox = document.querySelector("target-color-box");
        targetColorBox.style.width = '50vw'
        targetColorBox.style.height = '50vh'
        targetColorBox.style.backgroundColor = blendColors(colors)
    </script>
</body>
